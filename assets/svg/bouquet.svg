<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320" fill="none" aria-hidden="true">
  <g opacity="0.92">
    <!-- stems -->
    <path d="M138 300C136 250 128 210 118 168C108 126 102 88 108 48" stroke="#3f5a4c" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M138 248C156 220 178 196 198 168" stroke="#5f7d6e" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M136 220C112 198 88 176 72 148" stroke="#5f7d6e" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M134 180C150 156 162 128 168 98" stroke="#8fa99a" stroke-width="1.6" stroke-linecap="round"/>

    <!-- eucalyptus leaves left -->
    <ellipse cx="78" cy="156" rx="28" ry="14" transform="rotate(-38 78 156)" fill="#8fa99a" opacity="0.85"/>
    <ellipse cx="64" cy="132" rx="24" ry="12" transform="rotate(-48 64 132)" fill="#5f7d6e" opacity="0.75"/>
    <ellipse cx="92" cy="178" rx="22" ry="11" transform="rotate(-28 92 178)" fill="#d5e3db" opacity="0.95"/>

    <!-- eucalyptus leaves right -->
    <ellipse cx="188" cy="176" rx="30" ry="14" transform="rotate(34 188 176)" fill="#5f7d6e" opacity="0.8"/>
    <ellipse cx="208" cy="152" rx="24" ry="12" transform="rotate(42 208 152)" fill="#8fa99a" opacity="0.85"/>
    <ellipse cx="170" cy="198" rx="20" ry="10" transform="rotate(24 170 198)" fill="#d5e3db"/>

    <!-- upper leaves -->
    <ellipse cx="156" cy="108" rx="26" ry="12" transform="rotate(18 156 108)" fill="#8fa99a" opacity="0.9"/>
    <ellipse cx="172" cy="84" rx="20" ry="10" transform="rotate(28 172 84)" fill="#5f7d6e" opacity="0.7"/>
    <ellipse cx="118" cy="72" rx="22" ry="11" transform="rotate(-22 118 72)" fill="#8fa99a" opacity="0.8"/>
    <ellipse cx="104" cy="52" rx="16" ry="8" transform="rotate(-32 104 52)" fill="#d5e3db"/>

    <!-- soft blossom -->
    <g transform="translate(118 36)">
      <circle cx="0" cy="0" r="7" fill="#efe8dc"/>
      <ellipse cx="0" cy="-16" rx="8" ry="14" fill="#d5e3db"/>
      <ellipse cx="14" cy="-8" rx="8" ry="14" transform="rotate(60)" fill="#8fa99a" opacity="0.75"/>
      <ellipse cx="14" cy="8" rx="8" ry="14" transform="rotate(120)" fill="#d5e3db"/>
      <ellipse cx="0" cy="16" rx="8" ry="14" fill="#8fa99a" opacity="0.7"/>
      <ellipse cx="-14" cy="8" rx="8" ry="14" transform="rotate(-120)" fill="#d5e3db"/>
      <ellipse cx="-14" cy="-8" rx="8" ry="14" transform="rotate(-60)" fill="#8fa99a" opacity="0.8"/>
      <circle cx="0" cy="0" r="5" fill="#5f7d6e" opacity="0.55"/>
    </g>

    <!-- smaller side blossom -->
    <g transform="translate(214 140)">
      <ellipse cx="0" cy="-11" rx="6" ry="10" fill="#d5e3db"/>
      <ellipse cx="10" cy="-4" rx="6" ry="10" transform="rotate(72)" fill="#8fa99a" opacity="0.8"/>
      <ellipse cx="6" cy="9" rx="6" ry="10" transform="rotate(144)" fill="#d5e3db"/>
      <ellipse cx="-6" cy="9" rx="6" ry="10" transform="rotate(-144)" fill="#8fa99a" opacity="0.75"/>
      <ellipse cx="-10" cy="-4" rx="6" ry="10" transform="rotate(-72)" fill="#d5e3db"/>
      <circle cx="0" cy="0" r="3.5" fill="#3f5a4c" opacity="0.45"/>
